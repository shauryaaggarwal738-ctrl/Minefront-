<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minefront — Bedrock Tier Testing</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#C0392B;--red-bright:#E74C3C;--red-glow:#ff4433;
  --gold:#F0A500;--gold-bright:#FFD166;
  --bg:#06030A;--bg2:#100508;--bg3:#1a0a0c;
  --surface:rgba(18,5,8,0.95);
  --border:rgba(192,57,43,0.22);--border-bright:rgba(231,76,60,0.5);
  --text:#e8d8d5;--text-dim:#8a7070;--text-muted:#3a2a2a;
  --orb:'Orbitron',sans-serif;--mono:'Share Tech Mono',monospace;--body:'Rajdhani',sans-serif;
  --mythic-a:#bf5fff;--mythic-b:#ff5fcb;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:16px;overflow-x:hidden;}

/* CURSOR */
*{cursor:none!important;}
#cur-o{position:fixed;width:32px;height:32px;border:2px solid rgba(192,57,43,0.7);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s,background .25s;}
#cur-i{position:fixed;width:5px;height:5px;background:var(--red-bright);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .12s,height .12s,background .2s;}
body.ch #cur-o{width:50px;height:50px;border-color:var(--gold);background:rgba(240,165,0,0.06);}
body.ch #cur-i{width:9px;height:9px;background:var(--gold);}
body.cc #cur-o{width:18px;height:18px;border-color:#fff;}

/* BG */
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(192,57,43,0.14),transparent),
             radial-gradient(ellipse 50% 40% at 90% 90%,rgba(150,20,20,0.07),transparent);
  pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(192,57,43,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,0.035) 1px,transparent 1px);
  background-size:40px 40px;animation:gridD 25s linear infinite;pointer-events:none;z-index:0;}
@keyframes gridD{from{background-position:0 0}to{background-position:40px 40px}}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
section,header,footer,nav,.overlay-modal{position:relative;z-index:1;}

/* SCROLL BTN */
#scroll-btn{position:fixed;right:22px;bottom:36px;z-index:9000;width:46px;height:46px;
  background:rgba(8,2,4,0.97);border:2px solid rgba(192,57,43,0.4);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  cursor:pointer!important;transition:all .3s;opacity:0;pointer-events:none;}
#scroll-btn.vis{opacity:1;pointer-events:auto;}
#scroll-btn:hover{border-color:var(--red-bright);box-shadow:0 0 20px rgba(231,76,60,0.4);}
#scroll-btn .arr{width:11px;height:5px;border-left:2px solid var(--red-bright);border-bottom:2px solid var(--red-bright);transform:rotate(-45deg);animation:aF 1.1s ease-in-out infinite;}
#scroll-btn .arr:nth-child(2){animation-delay:.18s;opacity:.5;}
#scroll-btn .arr:nth-child(3){animation-delay:.36s;opacity:.25;}
#scroll-btn .s-lbl{font-family:var(--mono);font-size:.24rem;color:rgba(231,76,60,0.5);letter-spacing:1px;}
@keyframes aF{0%,100%{opacity:1}50%{opacity:.15}}

/* NAME PROMPT OVERLAY */
#name-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:200000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  backdrop-filter:blur(20px);}
.name-box{
  background:#0e0408;border:2px solid var(--red);max-width:420px;width:100%;
  padding:2.5rem 2rem;text-align:center;position:relative;
  box-shadow:0 0 60px rgba(192,57,43,0.3);
}
.name-box::before,.name-box::after{content:'';position:absolute;width:16px;height:16px;border:2px solid var(--red-bright);}
.name-box::before{top:-2px;left:-2px;border-right:none;border-bottom:none;}
.name-box::after{bottom:-2px;right:-2px;border-left:none;border-top:none;}
.name-logo{font-family:var(--orb);font-size:1.4rem;font-weight:900;letter-spacing:4px;color:var(--red-bright);margin-bottom:.3rem;text-shadow:0 0 20px rgba(231,76,60,0.5);}
.name-sub{font-family:var(--mono);font-size:.65rem;color:var(--text-dim);letter-spacing:3px;margin-bottom:2rem;}
.name-prompt{font-family:var(--orb);font-size:.7rem;color:var(--text);letter-spacing:2px;margin-bottom:1rem;}
.name-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border-bright);
  color:var(--text);font-family:var(--body);font-size:1.1rem;padding:.7rem 1rem;
  outline:none;text-align:center;letter-spacing:2px;transition:border-color .2s;}
.name-input:focus{border-color:var(--red-bright);}
.name-enter-btn{margin-top:1rem;width:100%;background:var(--red);color:#fff;border:none;
  font-family:var(--orb);font-size:.62rem;font-weight:700;letter-spacing:3px;padding:.9rem;
  cursor:pointer!important;transition:background .2s,box-shadow .2s;}
.name-enter-btn:hover{background:var(--red-bright);box-shadow:0 0 24px rgba(231,76,60,0.4);}
.name-err{color:var(--red-bright);font-family:var(--mono);font-size:.55rem;letter-spacing:1px;margin-top:.6rem;min-height:16px;}

/* VISITOR BANNER */
#visitor-bar{
  background:rgba(192,57,43,0.08);border-bottom:1px solid rgba(192,57,43,0.18);
  padding:.4rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
  font-family:var(--mono);font-size:.62rem;color:var(--text-dim);position:relative;z-index:10;
}
.vbar-left{display:flex;align-items:center;gap:10px;}
.vbar-name{color:var(--red-bright);font-weight:700;letter-spacing:1px;}
.vbar-tag{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);padding:1px 8px;color:var(--red);}
.vbar-right{display:flex;align-items:center;gap:12px;}
.vbar-change{color:var(--text-muted);cursor:pointer!important;transition:color .2s;}
.vbar-change:hover{color:var(--red-bright);}
.vbar-online-wrap{display:flex;align-items:center;gap:5px;}
.vbar-dot{width:6px;height:6px;border-radius:50%;background:#00cc44;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,204,68,.5)}50%{box-shadow:0 0 0 5px rgba(0,204,68,0)}}

/* HEADER */
header{background:linear-gradient(180deg,#030104 0%,#0b0306 50%,#140508 100%);
  border-bottom:3px solid var(--red);text-align:center;padding:4.5rem 1rem 3.5rem;
  overflow:hidden;position:relative;}
header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 100%,rgba(192,57,43,0.2),transparent);pointer-events:none;}
header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:5px;
  background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 28px,#6b1208 28px,#6b1208 34px,var(--red) 34px,var(--red) 56px,#8b1c10 56px,#8b1c10 62px);}
.heyebrow{display:inline-block;font-family:var(--mono);font-size:.72rem;letter-spacing:5px;
  color:rgba(231,76,60,0.55);margin-bottom:1.2rem;border:1px solid rgba(192,57,43,0.28);padding:3px 18px;
  animation:fadeUp .8s ease .1s both;}
.logo-main{font-family:var(--orb);font-size:clamp(2rem,7vw,4.5rem);font-weight:900;letter-spacing:8px;
  color:#fff;position:relative;display:inline-block;
  text-shadow:0 0 40px rgba(231,76,60,0.6),0 0 80px rgba(192,57,43,0.25);
  animation:fadeUp .8s cubic-bezier(.22,1,.36,1) .3s both;}
.logo-main span{color:var(--red-bright);}
.logo-main::before,.logo-main::after{content:attr(data-text);position:absolute;inset:0;
  font-family:var(--orb);font-size:inherit;font-weight:inherit;letter-spacing:inherit;}
.logo-main::before{color:rgba(255,100,50,.6);clip-path:polygon(0 25%,100% 25%,100% 45%,0 45%);animation:gA 7s infinite;text-shadow:none;}
.logo-main::after{color:rgba(200,30,30,.5);clip-path:polygon(0 60%,100% 60%,100% 78%,0 78%);animation:gB 7s infinite;text-shadow:none;}
@keyframes gA{0%,93%,100%{opacity:0}94%{opacity:.9;transform:translate(-3px,0)}96%{transform:translate(3px,0)}}
@keyframes gB{0%,95%,100%{opacity:0}96%{opacity:.8;transform:translate(3px,0)}98%{transform:translate(-3px,0)}}
.logo-tag{font-family:var(--mono);font-size:.88rem;color:var(--text-dim);letter-spacing:5px;margin:.6rem 0 2rem;animation:fadeUp .8s ease .5s both;}
.hbadges{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;animation:fadeUp .8s ease .7s both;}
.hbadge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.7rem;letter-spacing:2px;
  padding:5px 14px;border:1px solid rgba(255,255,255,.08);color:var(--text-dim);background:rgba(255,255,255,.02);}
.hbadge.live{border-color:rgba(231,76,60,.4);color:var(--red-bright);}
.hbdot{width:6px;height:6px;border-radius:50%;background:var(--red-bright);animation:pulse 2s infinite;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* NAV */
nav{background:rgba(4,1,2,0.94);border-bottom:1px solid rgba(192,57,43,0.18);
  padding:.65rem 1rem;display:flex;justify-content:center;gap:1.8rem;flex-wrap:wrap;
  backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
nav a{font-family:var(--orb);font-size:.5rem;font-weight:700;color:var(--text-muted);
  text-decoration:none;letter-spacing:2px;padding:4px 2px;position:relative;transition:color .25s;}
nav a::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:var(--red-bright);transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.22,1,.36,1);}
nav a:hover,nav a.active{color:var(--red-bright);}
nav a:hover::after,nav a.active::after{transform:scaleX(1);}
.nav-cta{color:var(--gold)!important;border:1px solid rgba(240,165,0,0.3)!important;padding:4px 14px!important;
  background:rgba(240,165,0,0.05)!important;transition:all .25s!important;}
.nav-cta::after{background:var(--gold)!important;}
.nav-cta:hover{color:#000!important;background:var(--gold)!important;border-color:var(--gold)!important;box-shadow:0 0 18px rgba(240,165,0,0.4)!important;}

/* SECTION COMMON */
.sec-eyebrow{font-family:var(--mono);font-size:.65rem;letter-spacing:4px;text-align:center;margin-bottom:.4rem;color:var(--red);}
.sec-title{font-family:var(--orb);font-weight:900;font-size:clamp(1rem,3vw,1.6rem);text-align:center;letter-spacing:3px;margin-bottom:.4rem;}
.sec-line{width:60px;height:3px;margin:0 auto 3rem;background:linear-gradient(90deg,transparent,var(--red-bright),transparent);position:relative;}
.sec-line::before,.sec-line::after{content:'';position:absolute;top:0;width:5px;height:3px;background:var(--red);}
.sec-line::before{left:-5px;} .sec-line::after{right:-5px;}

/* ABOUT */
.about{max-width:780px;margin:5rem auto;padding:0 1.5rem;text-align:center;}
.about-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--red);
  padding:2rem 2.5rem;font-size:1.05rem;line-height:1.9;color:var(--text-dim);position:relative;overflow:hidden;}
.about-card::before{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(192,57,43,0.05),transparent);animation:shimmer 4s ease-in-out infinite;}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
.about-card strong{color:var(--text);}

/* PROGRESS STRIP */
.tier-progress{max-width:960px;margin:0 auto 3rem;padding:0 1.5rem;}
.progress-bar{display:flex;overflow:hidden;border:1px solid rgba(255,255,255,.04);}
.progress-step{flex:1;text-align:center;padding:.5rem .15rem;font-family:var(--mono);font-size:.33rem;letter-spacing:1px;
  position:relative;transition:filter .3s;cursor:pointer!important;}
.progress-step::after{content:'▶';position:absolute;right:-7px;top:50%;transform:translateY(-50%);font-size:.65rem;z-index:2;}
.progress-step:last-child::after{display:none;}
.progress-step:hover{filter:brightness(1.7);}
.ps-r{background:#0d0808;color:#555;} .ps-f{background:#080f18;color:#4a90d9;}
.ps-w{background:#0a0f14;color:#9ab0c8;} .ps-e{background:#110800;color:#FF8C00;}
.ps-l{background:#001212;color:#00ECEC;} .ps-m{background:linear-gradient(90deg,#0e0018,#180010);color:#bf5fff;}

/* TIERS */
.tiers-section{padding:3rem 1.5rem 5rem;max-width:1200px;margin:0 auto;}
.tiers-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:1.3rem;margin-top:1rem;}
.tier-card{background:rgba(6,2,4,0.94);border:1px solid rgba(255,255,255,.07);text-align:center;
  position:relative;overflow:hidden;transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s;cursor:pointer!important;}
.tier-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.03),transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none;}
.tier-card:hover{transform:translateY(-8px) scale(1.02);} .tier-card:hover::before{opacity:1;}
.tier-card::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);pointer-events:none;}
.tier-card:hover::after{left:200%;transition:left .5s ease;}
.tier-header{padding:1.4rem 1rem 1rem;position:relative;}
.tier-icon{font-size:2.8rem;display:block;margin-bottom:.7rem;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.tier-card:nth-child(2) .tier-icon{animation-delay:.5s;} .tier-card:nth-child(3) .tier-icon{animation-delay:1s;}
.tier-card:nth-child(4) .tier-icon{animation-delay:1.5s;} .tier-card:nth-child(5) .tier-icon{animation-delay:2s;}
.tier-card:nth-child(6) .tier-icon{animation-delay:2.5s;}
.tier-name{font-family:var(--orb);font-size:.56rem;font-weight:700;letter-spacing:2px;margin-bottom:.3rem;}
.tier-number{font-family:var(--mono);font-size:.82rem;opacity:.45;letter-spacing:2px;margin-bottom:.65rem;}
.tier-body{padding:.9rem 1rem 1.2rem;border-top:1px solid rgba(255,255,255,.04);}
.tier-desc{font-size:.88rem;line-height:1.65;color:var(--text-muted);margin-bottom:.9rem;}
.tier-perk{display:inline-block;padding:2px 9px;border:1px solid;letter-spacing:1px;font-family:var(--mono);font-size:.86rem;}
.tier-click-hint{font-family:var(--mono);font-size:.28rem;color:rgba(255,255,255,.2);margin-top:.5rem;letter-spacing:1px;}
.tier-recruit{border-color:#3a3030;} .tier-recruit .tier-header{background:linear-gradient(135deg,#0f0808,#1a1212);}
.tier-recruit .tier-name{color:#776060;} .tier-recruit .tier-perk{color:#665050;border-color:#665050;}
.tier-recruit:hover{box-shadow:0 14px 44px rgba(120,80,80,.15);}
.tier-fighter{border-color:#3a6fa0;} .tier-fighter .tier-header{background:linear-gradient(135deg,#060e18,#0e1c2e);}
.tier-fighter .tier-name{color:#4a90d9;} .tier-fighter .tier-perk{color:#4a90d9;border-color:#4a90d9;}
.tier-fighter:hover{box-shadow:0 14px 44px rgba(74,144,217,.22);}
.tier-warrior{border-color:#607080;} .tier-warrior .tier-header{background:linear-gradient(135deg,#0a1018,#14202c);}
.tier-warrior .tier-name{color:#a0c0d8;} .tier-warrior .tier-perk{color:#a0b8c8;border-color:#a0b8c8;}
.tier-warrior:hover{box-shadow:0 14px 44px rgba(160,192,216,.15);}
.tier-elite{border-color:#bb5500;} .tier-elite .tier-header{background:linear-gradient(135deg,#0f0500,#1e0c00);}
.tier-elite .tier-name{color:#FF8C00;} .tier-elite .tier-perk{color:#FF8C00;border-color:#FF8C00;}
.tier-elite:hover{box-shadow:0 14px 44px rgba(255,140,0,.28);}
.tier-elite .tier-icon{animation:fF 3s ease-in-out 1.5s infinite;}
@keyframes fF{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
.tier-legend{border-color:#009090;} .tier-legend .tier-header{background:linear-gradient(135deg,#001010,#002020);}
.tier-legend .tier-name{color:#00ECEC;animation:lG 2s ease-in-out infinite;}
@keyframes lG{0%,100%{text-shadow:0 0 6px rgba(0,236,236,.4)}50%{text-shadow:0 0 20px rgba(0,236,236,.9),0 0 40px rgba(0,236,236,.4)}}
.tier-legend .tier-perk{color:#00ECEC;border-color:#00ECEC;} .tier-legend:hover{box-shadow:0 14px 54px rgba(0,236,236,.3);}
.tier-mythic{border-color:var(--mythic-a);position:relative;}
.tier-mythic>.mythic-border{content:'';position:absolute;inset:-2px;
  background:linear-gradient(135deg,var(--mythic-a),var(--mythic-b),#5f5fff,var(--mythic-a));
  background-size:300% 300%;animation:mBorder 3s linear infinite;z-index:-1;}
@keyframes mBorder{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.tier-mythic .tier-header{background:linear-gradient(135deg,#0a0018,#180028);}
.tier-mythic .tier-name{background:linear-gradient(90deg,var(--mythic-a),var(--mythic-b));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:mNG 2s ease-in-out infinite;}
@keyframes mNG{0%,100%{filter:drop-shadow(0 0 6px rgba(191,95,255,.5))}50%{filter:drop-shadow(0 0 18px rgba(255,95,203,.9))}}
.tier-mythic .tier-perk{color:var(--mythic-a);border-color:var(--mythic-a);}
.tier-mythic:hover{box-shadow:0 14px 60px rgba(191,95,255,.45),0 0 36px rgba(255,95,203,.2);}
.tier-mythic .tier-icon{animation:fM 3s ease-in-out 2.5s infinite;}
@keyframes fM{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-6px) scale(1.05)}75%{transform:translateY(-3px) scale(.97)}}
.mythic-crown{position:absolute;top:0;left:50%;transform:translateX(-50%);
  background:linear-gradient(90deg,var(--mythic-a),var(--mythic-b));
  font-family:var(--mono);font-size:.3rem;color:#fff;padding:2px 10px;letter-spacing:2px;white-space:nowrap;}
.mythic-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.mythic-star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:sT 2s ease-in-out infinite;}
@keyframes sT{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1.5)}}

/* TIER MODAL */
#tm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:50000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(12px);}
#tm-overlay.open{opacity:1;pointer-events:all;}
#tm-box{background:#0c0305;border:1px solid rgba(255,255,255,.08);max-width:520px;width:100%;
  position:relative;transform:scale(.88) translateY(20px);transition:transform .35s cubic-bezier(.22,1,.36,1);
  overflow:hidden;max-height:90vh;overflow-y:auto;}
#tm-overlay.open #tm-box{transform:scale(1) translateY(0);}
.tm-topbar{height:4px;}
.tm-header{padding:1.8rem 1.8rem 1rem;display:flex;align-items:center;gap:1.2rem;border-bottom:1px solid rgba(255,255,255,.05);}
.tm-icon{font-size:3.2rem;flex-shrink:0;animation:float 3s ease-in-out infinite;}
.tm-label{font-family:var(--mono);font-size:.38rem;color:#444;letter-spacing:2px;margin-bottom:.3rem;}
.tm-name{font-family:var(--orb);font-size:.82rem;font-weight:700;letter-spacing:2px;}
.tm-rank{font-family:var(--mono);font-size:1.1rem;color:#444;letter-spacing:3px;margin-top:.2rem;}
.tm-close{position:absolute;top:1rem;right:1rem;width:28px;height:28px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.5rem;color:#555;
  cursor:pointer!important;transition:background .2s,color .2s;}
.tm-close:hover{background:rgba(192,57,43,.2);color:#ff6b6b;}
.tm-body{padding:1.4rem 1.8rem 1.8rem;}
.tm-sec{font-family:var(--mono);font-size:.42rem;color:#444;letter-spacing:2px;
  margin-bottom:.8rem;display:flex;align-items:center;gap:8px;}
.tm-sec::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.04);}
.tm-skill-banner{display:flex;align-items:flex-start;gap:1rem;padding:.9rem 1.1rem;border:1px solid;margin-bottom:.2rem;}
